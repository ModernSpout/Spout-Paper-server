# Builds the server JAR
name: build-server
on:
  push:
    branches: [ "master" ]
jobs:
  build:
    # Only runs on master, and if the last commit does not start with [ci-skip]
    if: ${{ !contains(github.event.commits[0].message, '[ci-skip]') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 21 ]
      fail-fast: true
    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v6
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
        continue-on-error: true
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Apply patches
        run: |
          git config --global user.email "no-reply@github.com"
          git config --global user.name "Github Actions"
          ./gradlew applyAllPatches --stacktrace
      - name: Build JAR
        run: ./gradlew createMojmapPaperclipJar --stacktrace
      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: Spout server JAR
          path: spout-server/build/libs/spout-paperclip-*-mojmap.jar
          archive: false
