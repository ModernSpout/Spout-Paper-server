name: Build Spout
on: [ push ]
jobs:
  build:
    # Only runs on master, and if the last commit does not start with [ci-skip]
    if: github.ref == 'refs/heads/master' && ${{ !contains(github.event.commits[0].message, '[ci-skip]') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 21 ]
      fail-fast: true
    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v6
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v1
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Apply patches
        run: |
          git config --global user.email "no-reply@github.com"
          git config --global user.name "Github Actions"
          ./gradlew applyAllPatches --stacktrace
      - name: Build JAR
        run: ./gradlew createMojmapPaperclipJar --stacktrace
      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: Spout
          path: spout-server/build/libs/spout-server-*.jar
